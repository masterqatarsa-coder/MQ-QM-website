services:
  - type: web
    name: mq-qm-website
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: mq-qm-api
    runtime: docker
    dockerfilePath: ./php-backend/Dockerfile
    dockerContext: ./php-backend
    healthCheckPath: /api/public/settings.php
    envVars:
      - key: PORT
        value: 10000
      - key: APP_DATA_DIR
        value: /var/www/html/data
      - key: SESSION_COOKIE_SAMESITE
        value: None
      - key: APP_ALLOWED_ORIGINS
        sync: false
      - key: APP_SECURITY_KEY
        generateValue: true
      - key: ADMIN_DEFAULT_LOGIN
        value: admin
      - key: ADMIN_DEFAULT_PASSWORD
        sync: false
      - key: ADMIN_DEFAULT_NAME
        value: Admin
      - key: ADMIN_DEFAULT_EMAIL
        sync: false
      - key: ADMIN_DEFAULT_PHONE
        sync: false
      - key: DEV_OTP_CODE
        value: ""
      - key: ADMIN_TRUST_PROXY_HEADERS
        value: 1
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_AUTH
        value: 1
      - key: SMTP_ENCRYPTION
        value: tls
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: Master Qatar Website
    disk:
      name: mq-qm-data
      mountPath: /var/www/html/data
      sizeGB: 1
